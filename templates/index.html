<!DOCTYPE html>
<html>

<head>
    <title>KHETI-AI - Plant Disease Detection</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8eef8;
        }

        .upload-area p {
            color: #666;
            margin: 10px 0;
        }

        input[type="file"] {
            display: none;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        #result {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .disease-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .confidence {
            font-size: 16px;
            color: #666;
            margin-bottom: 5px;
        }

        .confidence-bar {
            background: #ddd;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s;
        }

        .error {
            background: #ffe8e8;
            border-left-color: #ff6b6b;
            color: #c92a2a;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌾 KHETI-AI</h1>
        <p class="subtitle">Plant Disease Detection using YOLOv8</p>

        <div class="upload-area" id="uploadArea">
            <p>📸 Click or drag image here</p>
            <p style="font-size: 12px; color: #999;">Supported: JPG, PNG (max 50MB)</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <img id="preview" alt="preview">

        <button id="analyzeBtn" onclick="analyzeImage()" disabled>
            🔍 Analyze Image
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing... Please wait</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        let selectedFile = null;

        // Click to upload
        uploadArea.onclick = () => fileInput.click();

        // Handle file selection
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    analyzeBtn.disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        // Drag and drop
        uploadArea.ondragover = (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        };

        uploadArea.ondragleave = () => {
            uploadArea.classList.remove('dragover');
        };

        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            selectedFile = e.dataTransfer.files[0];
            fileInput.files = e.dataTransfer.files;

            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                analyzeBtn.disabled = false;
            };
            reader.readAsDataURL(selectedFile);
        };

        // Analyze image
        async function analyzeImage() {
            if (!selectedFile) return;

            loading.style.display = 'block';
            result.style.display = 'none';
            analyzeBtn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const response = await fetch('/api/analyze-image', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            image: e.target.result,
                            crop_type: 'unknown'
                        })
                    });

                    const data = await response.json();
                    loading.style.display = 'none';

                    if (data.success) {
                        const confidence = (data.confidence * 100).toFixed(1);
                        result.innerHTML = `
                            <div class="disease-name">🌿 ${data.disease}</div>
                            <div class="confidence">
                                Confidence: ${confidence}%
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${confidence}%"></div>
                                </div>
                            </div>
                            <div class="confidence" style="margin-top: 15px; font-size: 12px;">
                                ⏱️ Analysis time: ${data.inference_time_ms}ms
                            </div>
                        `;
                        result.classList.remove('error');
                    } else {
                        result.innerHTML = `<div class="disease-name">❌ Error</div>
                                          <p>${data.error || 'Failed to analyze'}</p>`;
                        result.classList.add('error');
                    }
                    result.style.display = 'block';

                } catch (error) {
                    loading.style.display = 'none';
                    result.innerHTML = `<div class="disease-name">❌ Error</div>
                                      <p>${error.message}</p>`;
                    result.classList.add('error');
                    result.style.display = 'block';
                }
                analyzeBtn.disabled = false;
            };
            reader.readAsDataURL(selectedFile);
        }
    </script>
</body>

</html>
